name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux (GCC via apt)
  build-linux:
    name: Linux (GCC, ${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DQUICKSEEK_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Windows (MSVC via Visual Studio)
  build-windows:
    name: Windows (MSVC, ${{ matrix.build_type }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DQUICKSEEK_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  # Format check (clang-format --dry-run)
  # Formatting is enforced locally via the pre-commit hook (scripts/pre-commit)
  format-check:
    name: clang-format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src include tools test -name '*.cpp' -o -name '*.h' | \
          xargs clang-format --style=file:config/.clang-format --dry-run --Werror
